<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Establish New Book - Universidad Ducky</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <header class="top-navbar">
        <div class="logo-area">
            <h2 class="text-logo"><i class="fa-solid fa-book-open-reader"></i> DUCKY <span>UNIVERSIDAD</span></h2>
        </div>
        <nav class="top-nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="catalogSettings.html" class="active">Catalog</a>
            <a href="dashboard.html">Users</a>
            <a href="#">Settings</a>
        </nav>
        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="Admin Profile" class="avatar-img">
        </div>
    </header>

    <main class="form-page-container edit-user-page">
        
        <div class="form-header-area">
            <a href="catalogSettings.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
            <h1>Establish New Book</h1>
            <p>Register a new book for the library.</p>
        </div>

        <div class="form-card">
            <form id="bookRegisterForm">
                
                <div class="form-section">
                    <h3 class="section-title">Basic Information</h3>
                    
                    <div class="input-grid full-width">
                        <div class="input-group">
                            <label for="bookTitle">Book's Title</label>
                            <input type="text" id="bookTitle" class="base-input" placeholder="e.g. Harry Potter: The Philosopher's Stone">
                        </div>
                    </div>
                    
                    <div class="input-grid 2-cols">
                        <div class="input-group">
                            <label for="bookAuthor">Author</label>
                            <input type="text" id="bookAuthor" class="base-input" placeholder="e.g. J.K Rowling">
                        </div>
                        <div class="input-group">
                            <label for="bookEditorial">Editorial</label>
                            <input type="text" id="bookEditorial" class="base-input" placeholder="Bloomburry Publishing">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="section-title">Book's Details</h3>
                    
                    <div class="details-split-grid">
                        <div class="details-left">
                            <div class="input-group">
                                <label for="bookYear">Year</label>
                                <input type="number" id="bookYear" class="base-input" placeholder="1997">
                            </div>
                            <div class="input-group">
                                <label for="bookPrice">Unitarian Price</label>
                                <input type="text" id="bookPrice" class="base-input" placeholder="$250.00 MXN">
                            </div>
                        </div>
                        
                        <div class="details-right">
                            <div class="input-group h-100">
                                <label for="bookDescription">Description</label>
                                <textarea id="bookDescription" class="base-input textarea-input" placeholder="e.g. A young wizard gets invited to a magical school and joins another wizard students in an adventure to find a powerful stone"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="section-title">Book's Location</h3>
                    
                    <div class="input-grid 2-cols">
                        <div class="input-group">
                            <label for="locLibrary">Library</label>
                            <div class="select-wrapper">
                                <select id="locLibrary" class="base-input select-input">
                                    <option value="" disabled selected>Choose Library</option>
                                    <option value="estoa">Estoa</option>
                                    <option value="ccu">CCU</option>
                                </select>
                                <i class="fa-solid fa-chevron-down select-icon"></i>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="locUnits">Available Units</label>
                            <div class="select-wrapper">
                                <select id="locUnits" class="base-input select-input">
                                    <option value="" disabled selected>0</option>
                                    <option value="1">1</option>
                                    <option value="5">5</option>
                                    <option value="10">10</option>
                                </select>
                                <i class="fa-solid fa-chevron-down select-icon"></i>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="locZone">Library Zone</label>
                            <div class="select-wrapper">
                                <select id="locZone" class="base-input select-input">
                                    <option value="" disabled selected>Choose Zone</option>
                                    <option value="level3">Level 3</option>
                                    <option value="level2">Level 2</option>
                                    <option value="level1">Level 1</option>
                                </select>
                                <i class="fa-solid fa-chevron-down select-icon"></i>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="locShelf">Shelf</label>
                            <div class="select-wrapper">
                                <select id="locShelf" class="base-input select-input">
                                    <option value="" disabled selected>Choose Shelf</option>
                                    <option value="b4">B4</option>
                                    <option value="b5">B5</option>
                                    <option value="a1">A1</option>
                                </select>
                                <i class="fa-solid fa-chevron-down select-icon"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions" style="justify-content: flex-end; gap: 15px;">
                    <a href="catalogSettings.html" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-save">Register Book</button>
                </div>

            </form>
        </div>
        
        <p class="footer-note">A confirmation email will be sent to the user upon creation.</p>
    </main>

    <script src="bookRegister.js"></script>
</body>
</html>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('bookRegisterForm');

    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const inputs = form.querySelectorAll('.base-input');
        let isValid = true;

        inputs.forEach(input => {
            if (input.value.trim() === '' || input.value === null) {
                isValid = false;
                input.style.borderColor = '#ef4444';
            } else {
                input.style.borderColor = 'var(--border-color)';
            }
        });

        if (!isValid) {
            alert('Please fill out all the fields before registering a new book.');
            return;
        }

        const confirmRegistration = confirm('¿Confirmar registro de libro?');

        if (confirmRegistration) {
            window.location.href = 'catalogSettings.html';
        }
    });

    const allInputs = form.querySelectorAll('.base-input');
    allInputs.forEach(input => {
        input.addEventListener('input', function() {
            this.style.borderColor = 'var(--border-color)';
        });
    });
});
</script>
